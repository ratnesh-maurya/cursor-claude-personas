name: Labels and Comments

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]
  issues:
    types: [opened, edited, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  label-and-greet:
    runs-on: ubuntu-latest
    steps:
      - name: Apply labels based on title
        uses: actions-ecosystem/action-add-labels@v1
        if: github.event_name == 'pull_request'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          labels: |
            enhancement:feat
            bug:fix
            docs:docs

      - name: Comment on first-time contributor PRs
        if: github.event_name == 'pull_request' && github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: [
                "Thanks for your first contribution! 🎉",
                "",
                "A maintainer will review this PR soon. In the meantime:",
                "- Make sure CI is green.",
                "- Add tests or docs if appropriate.",
                "- Reply to any review comments you receive."
              ].join("\n")
            });

