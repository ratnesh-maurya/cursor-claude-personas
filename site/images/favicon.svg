    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="6" fill="#0a1628"/>
  <!-- Three stacked cards -->
  <rect x="6" y="8" width="14" height="18" rx="2.5" fill="none" stroke="#2a4470" stroke-width="1.2" opacity="0.4"/>
  <rect x="9" y="5.5" width="14" height="18" rx="2.5" fill="none" stroke="#3d6098" stroke-width="1.2" opacity="0.6"/>
  <rect x="12" y="3" width="14" height="18" rx="2.5" fill="#0d192f" stroke="#39d3df" stroke-width="1.2"/>
  <!-- Person dot -->
